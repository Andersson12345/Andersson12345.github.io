<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fälgar</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<button id="vagn">🛒</button>

<button id="tillbaka" class="pil">←</button>
<h1>Välj falgar</h1>

<div class="container">

<div class="bil">
<img id="falgar1" src="" alt="falgar" width="200">
<p id="pris1"></p>
</div>

<div class="bil">
<img id="falgar2" src="" alt="falgar" width="200">
<p id="pris2"></p>
</div>

<div class="bil">
<img id="falgar3" src="" alt="falgar" width="200">
<p id="pris3"></p>
</div>

</div>

<script>

let bil = localStorage.getItem("bil");

let falgar1 = document.getElementById("falgar1");
let falgar2 = document.getElementById("falgar2");
let falgar3 = document.getElementById("falgar3");

let pris1 = document.getElementById("pris1");
let pris2 = document.getElementById("pris2");
let pris3 = document.getElementById("pris3");

if (bil == "Mercedes GT63") {

falgar1.src = "img/mercedes_falgar1.jpg";
falgar2.src = "img/mercedes_falgar2.jpg";
falgar3.src = "img/mercedes_falgar3.jpg";

pris1.innerText = "15000 kr";
pris2.innerText = "25000 kr";
pris3.innerText = "40000 kr";

}

else if (bil == "Bmw M4") {

falgar1.src = "img/bmw_falgar1.jpg";
falgar2.src = "img/bmw_falgar2.jpg";
falgar3.src = "img/bmw_falgar3.jpg";

pris1.innerText = "14000 kr";
pris2.innerText = "24000 kr";
pris3.innerText = "38000 kr";

}

else if (bil == "Audi RS6") {

falgar1.src = "img/audi_falgar1.jpg";
falgar2.src = "img/audi_falgar2.jpg";
falgar3.src = "img/audi_falgar3.jpg";

pris1.innerText = "16000 kr";
pris2.innerText = "26000 kr";
pris3.innerText = "42000 kr";

}

let tillbaka = document.getElementById("tillbaka");

tillbaka.addEventListener("click", function () {
    window.location.href = "uppgraderingar.html";
});

falgar1.addEventListener("click", function () {
    localStorage.setItem("falgar", "falgar 1");

    let gammaltPris = Number(localStorage.getItem("falgarPris"));

    if (bil == "Mercedes GT63") {
        localStorage.setItem("falgarPris", 15000);
    }

    else if (bil == "Bmw M4") {
        localStorage.setItem("falgarPris", 14000);
    }

    else if (bil == "Audi RS6") {
        localStorage.setItem("falgarPris", 16000);
    }
});

falgar2.addEventListener("click", function () {
    localStorage.setItem("falgar", "falgar 2");

    let gammaltPris = Number(localStorage.getItem("falgarPris"));

    if (bil == "Mercedes GT63") {
        localStorage.setItem("falgarPris", 25000);
    }

    else if (bil == "Bmw M4") {
        localStorage.setItem("falgarPris", 24000);
    }

    else if (bil == "Audi RS6") {
        localStorage.setItem("falgarPris", 26000);
    }
});
falgar3.addEventListener("click", function () {
    localStorage.setItem("falgar", "falgar 3");

    let gammaltPris = Number(localStorage.getItem("falgarPris"));

    if (bil == "Mercedes GT63") {
        localStorage.setItem("falgarPris", 40000);
    }

    else if (bil == "Bmw M4") {
        localStorage.setItem("falgarPris", 38000);
    }

    else if (bil == "Audi RS6") {
        localStorage.setItem("falgarPris", 42000);
    }
});

let vagn = document.getElementById("vagn");

vagn.addEventListener("click", function () {
    window.location.href = "vagn.html";
});


</script>

</body>
</html>
